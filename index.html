<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Gary提词器</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F5F0EB;
      color: #3E2723;
      min-height: 100vh;
      user-select: none;
      -webkit-user-select: none;
    }
    .page { display: none; min-height: 100vh; }
    .page.active { display: block; }

    /* ── Home Page ── */
    .home-header {
      background: #6F4E37;
      color: #fff;
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .home-title { font-size: 18px; font-weight: 700; letter-spacing: 2px; }
    .home-actions { display: flex; gap: 12px; align-items: center; }
    .icon-btn {
      background: none; border: none; color: #fff;
      font-size: 20px; cursor: pointer; padding: 4px;
    }
    .select-btn { font-size: 14px; }
    .script-list { padding: 12px; }
    .script-item {
      background: #fff;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: transform 0.1s;
    }
    .script-item:active { transform: scale(0.98); }
    .script-item .checkbox {
      width: 22px; height: 22px; border: 2px solid #ccc;
      border-radius: 6px; flex-shrink: 0; display: none;
      align-items: center; justify-content: center;
    }
    .script-item .checkbox.checked { background: #6F4E37; border-color: #6F4E37; }
    .script-item .checkbox.checked::after { content: '✓'; color: #fff; font-size: 14px; }
    .script-item.selecting .checkbox { display: flex; }
    .script-info { flex: 1; min-width: 0; }
    .script-info .title { font-size: 15px; font-weight: 600; color: #3E2723; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .script-info .meta { font-size: 11px; color: #A1887F; margin-top: 4px; }
    .empty-state { text-align: center; padding: 60px 20px; color: #BCAAA4; }
    .empty-state .icon { font-size: 56px; }
    .empty-state p { margin-top: 10px; font-size: 14px; }
    .fab {
      position: fixed; bottom: 24px; right: 24px;
      width: 56px; height: 56px; border-radius: 28px;
      background: #6F4E37; color: #fff; border: none;
      font-size: 28px; cursor: pointer;
      box-shadow: 0 4px 16px rgba(111,78,55,0.3);
      z-index: 20;
    }
    .delete-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #D32F2F; color: #fff;
      padding: 14px 20px;
      text-align: center;
      font-size: 16px; font-weight: 600;
      display: none; z-index: 30;
    }

    /* ── Editor Page ── */
    .editor-header {
      background: #6F4E37; color: #fff;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky; top: 0; z-index: 10;
    }
    .editor-header .back { font-size: 18px; cursor: pointer; }
    .editor-header input {
      flex: 1; background: rgba(255,255,255,0.15); border: none;
      color: #fff; padding: 8px 12px; border-radius: 8px;
      font-size: 14px; outline: none;
    }
    .editor-header input::placeholder { color: rgba(255,255,255,0.5); }
    .editor-card {
      background: #fff; margin: 12px; border-radius: 14px;
      padding: 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .editor-card textarea {
      width: 100%; height: 280px; border: none; resize: none;
      font-size: 15px; line-height: 1.8; outline: none;
      font-family: inherit; color: #3E2723;
    }
    .editor-tools {
      display: flex; gap: 8px; padding: 0 12px 12px;
    }
    .tool-btn {
      flex: 1; padding: 12px; border-radius: 12px;
      border: none; font-size: 13px; font-weight: 600;
      cursor: pointer; letter-spacing: 1px;
    }
    .btn-paste { background: #E8E0D9; color: #6F4E37; }
    .btn-save { background: #E8E0D9; color: #6F4E37; }
    .btn-start {
      background: #6F4E37; color: #fff;
      margin: 0 12px 20px; width: calc(100% - 24px);
      padding: 16px; border-radius: 14px; border: none;
      font-size: 17px; font-weight: 700; cursor: pointer;
      letter-spacing: 2px;
    }
    .btn-start:active { background: #5D3D2A; }

    /* ── Presenter Page ── */
    .presenter-page { background: #000; }
    .presenter-header {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; justify-content: space-between;
      padding: 12px 16px; z-index: 20;
    }
    .presenter-header .icon-btn { color: #666; }
    .presenter-content {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 60px 0;
    }
    .presenter-text {
      color: #fff; text-align: center; line-height: 1.6;
      transition: transform 0.3s;
    }
    .presenter-text.mirror { transform: scaleX(-1); }
    .progress-bar {
      position: fixed; right: 0; top: 0; bottom: 0;
      width: 3px; background: rgba(255,255,255,0.1);
      z-index: 15;
    }
    .progress-fill {
      position: absolute; top: 0; left: 0; right: 0;
      background: rgba(255,255,255,0.4);
      transition: height 0.1s linear;
    }
    .presenter-edit {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.9); z-index: 30;
      padding: 12px; display: none;
    }
    .presenter-edit textarea {
      width: 100%; height: 120px; background: #222; color: #fff;
      border: 1px solid #444; border-radius: 8px; padding: 10px;
      font-size: 14px; resize: none; font-family: inherit;
    }
    .presenter-edit .done-btn {
      width: 100%; margin-top: 8px; padding: 10px;
      background: #6F4E37; color: #fff; border: none;
      border-radius: 8px; font-size: 14px; cursor: pointer;
    }

    /* ── Settings Panel ── */
    .settings-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      z-index: 25; display: none; align-items: flex-end;
    }
    .settings-overlay.show { display: flex; }
    .settings-panel {
      background: #1a1a1a; border-radius: 20px 20px 0 0;
      padding: 20px 24px 40px; width: 100%; color: #fff;
    }
    .settings-panel h3 { font-size: 16px; margin-bottom: 16px; text-align: center; }
    .setting-row {
      display: flex; justify-content: space-between;
      align-items: center; padding: 12px 0;
      border-bottom: 1px solid #333;
    }
    .setting-label { font-size: 14px; }
    .setting-row input[type="range"] { width: 120px; }
    .speed-btns { display: flex; gap: 6px; flex-wrap: wrap; }
    .speed-btn {
      padding: 6px 12px; border-radius: 8px; border: 1px solid #555;
      background: transparent; color: #aaa; font-size: 12px; cursor: pointer;
    }
    .speed-btn.active { background: #6F4E37; border-color: #6F4E37; color: #fff; }
    .toggle-switch {
      width: 48px; height: 28px; border-radius: 14px;
      background: #555; position: relative; cursor: pointer;
      transition: background 0.2s;
    }
    .toggle-switch.on { background: #6F4E37; }
    .toggle-switch::after {
      content: ''; position: absolute; top: 3px; left: 3px;
      width: 22px; height: 22px; border-radius: 11px;
      background: #fff; transition: left 0.2s;
    }
    .toggle-switch.on::after { left: 23px; }
    .settings-close {
      width: 100%; margin-top: 16px; padding: 12px;
      background: #333; color: #fff; border: none;
      border-radius: 10px; font-size: 14px; cursor: pointer;
    }

    /* Toast */
    .toast {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
      background: rgba(0,0,0,0.8); color: #fff; padding: 10px 24px;
      border-radius: 20px; font-size: 13px; z-index: 100;
      opacity: 0; transition: opacity 0.3s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<!-- ===== HOME PAGE ===== -->
<div class="page active" id="homePage">
  <div class="home-header">
    <span class="home-title">📽 Gary提词器</span>
    <div class="home-actions">
      <button class="icon-btn select-btn" onclick="toggleSelectMode()" id="selectToggle">选择</button>
    </div>
  </div>
  <div class="script-list" id="scriptList"></div>
  <button class="fab" onclick="newScript()">＋</button>
  <div class="delete-bar" id="deleteBar" onclick="deleteSelected()">🗑 删除所选</div>
</div>

<!-- ===== EDITOR PAGE ===== -->
<div class="page" id="editorPage">
  <div class="editor-header">
    <span class="back" onclick="goHome()">←</span>
    <input type="text" id="scriptTitle" placeholder="输入标题...">
  </div>
  <div class="editor-card">
    <textarea id="scriptContent" placeholder="在此输入或粘贴演讲内容..."></textarea>
  </div>
  <div class="editor-tools">
    <button class="tool-btn btn-paste" onclick="pasteFromClipboard()">📋 粘贴</button>
    <button class="tool-btn btn-save" onclick="saveCurrent()">💾 保存</button>
  </div>
  <button class="btn-start" onclick="startPresent()">🎤 开始提词</button>
</div>

<!-- ===== PRESENTER PAGE ===== -->
<div class="page presenter-page" id="presenterPage">
  <div class="presenter-header">
    <button class="icon-btn" onclick="stopPresent()">←</button>
    <button class="icon-btn" onclick="openSettings()">⚙</button>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="presenter-content" id="presenterContent">
    <div class="presenter-text" id="presenterText"></div>
  </div>
  <div class="presenter-edit" id="presenterEdit">
    <textarea id="presenterEditText"></textarea>
    <button class="done-btn" onclick="finishInlineEdit()">完成编辑</button>
  </div>
</div>

<!-- ===== SETTINGS ===== -->
<div class="settings-overlay" id="settingsOverlay">
  <div class="settings-panel" onclick="event.stopPropagation()">
    <h3>⚙ 设置</h3>

    <div class="setting-row">
      <span class="setting-label">播放速度</span>
      <div class="speed-btns">
        <button class="speed-btn" data-speed="120" onclick="setSpeed(120,this)">120</button>
        <button class="speed-btn" data-speed="180" onclick="setSpeed(180,this)">180</button>
        <button class="speed-btn active" data-speed="240" onclick="setSpeed(240,this)">240</button>
        <button class="speed-btn" data-speed="300" onclick="setSpeed(300,this)">300</button>
        <button class="speed-btn" data-speed="360" onclick="setSpeed(360,this)">360</button>
      </div>
    </div>

    <div class="setting-row">
      <span class="setting-label">🪞 镜像</span>
      <div class="toggle-switch" id="mirrorToggle" onclick="toggleMirror()"></div>
    </div>

    <div class="setting-row">
      <span class="setting-label">📐 页边距</span>
      <input type="range" min="10" max="40" value="25" oninput="updateMargin(this.value)">
    </div>

    <div class="setting-row">
      <span class="setting-label">🔤 字体大小</span>
      <input type="range" min="24" max="60" value="36" oninput="updateFontSize(this.value)">
    </div>

    <div class="setting-row">
      <span class="setting-label">🎙 语音跟踪</span>
      <div class="toggle-switch" id="voiceToggle" onclick="toggleVoice()"></div>
    </div>

    <button class="settings-close" onclick="closeSettings()">关闭</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── App State ──
let scripts = JSON.parse(localStorage.getItem('gary_scripts') || '[]');
let currentId = null;
let selectMode = false;
let selectedIds = new Set();

let presenterState = {
  running: false,
  speed: 240, // 字/分
  mirror: false,
  margin: 25,
  fontSize: 36,
  voiceOn: false,
  words: [],
  currentWord: 0,
  rafId: null,
  lastTime: 0,
  charsPerMs: 240 / 60000,
  longPressTimer: null,
};

// ── Home ──
function renderHome() {
  const el = document.getElementById('scriptList');
  if (scripts.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="icon">📂</div><p>还没有提词稿<br>点击 ＋ 新建</p></div>';
    return;
  }
  el.innerHTML = scripts.map((s, i) => `
    <div class="script-item ${selectMode ? 'selecting' : ''}" onclick="${selectMode ? `toggleCheck(${i},event)` : `openScript(${i})`}">
      <div class="checkbox ${selectedIds.has(i) ? 'checked' : ''}"></div>
      <div class="script-info">
        <div class="title">${esc(s.title || '未命名')}</div>
        <div class="meta">${s.date} · ${charCount(s.content)}字</div>
      </div>
    </div>
  `).join('');
  document.getElementById('selectToggle').textContent = selectMode ? '取消' : '选择';
  document.getElementById('deleteBar').style.display = selectMode ? 'block' : 'none';
}

function charCount(t) { return t.replace(/\s/g, '').length; }
function esc(s) { return s.replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function newScript() {
  if (selectMode) return;
  currentId = Date.now().toString();
  document.getElementById('scriptTitle').value = '';
  document.getElementById('scriptContent').value = '';
  showPage('editorPage');
}

function openScript(idx) {
  if (selectMode) return;
  const s = scripts[idx];
  currentId = s.id;
  document.getElementById('scriptTitle').value = s.title;
  document.getElementById('scriptContent').value = s.content;
  showPage('editorPage');
}

function toggleSelectMode() {
  selectMode = !selectMode;
  selectedIds.clear();
  renderHome();
}

function toggleCheck(idx, e) {
  e.stopPropagation();
  if (selectedIds.has(idx)) selectedIds.delete(idx);
  else selectedIds.add(idx);
  renderHome();
}

function deleteSelected() {
  if (selectedIds.size === 0) return;
  if (!confirm(`确定删除 ${selectedIds.size} 个提词稿？`)) return;
  const sorted = [...selectedIds].sort((a,b) => b-a);
  for (const i of sorted) scripts.splice(i, 1);
  selectedIds.clear();
  selectMode = false;
  saveScripts();
  renderHome();
}

// ── Editor ──
function saveCurrent() {
  const title = document.getElementById('scriptTitle').value.trim() || '未命名';
  const content = document.getElementById('scriptContent').value;
  const idx = scripts.findIndex(s => s.id === currentId);
  const obj = { id: currentId, title, content, date: today() };
  if (idx >= 0) scripts[idx] = obj;
  else scripts.unshift(obj);
  saveScripts();
  toast('已保存 ✅');
}

async function pasteFromClipboard() {
  try {
    const text = await navigator.clipboard.readText();
    if (text) {
      document.getElementById('scriptContent').value = text;
      toast('已粘贴 📋');
    }
  } catch(e) {
    toast('请手动粘贴');
  }
}

function goHome() {
  saveCurrent();
  showPage('homePage');
  renderHome();
}

// ── Presenter ──
function startPresent() {
  const content = document.getElementById('scriptContent').value;
  if (!content.trim()) { toast('请先输入内容'); return; }
  saveCurrent();
  const words = splitForDisplay(content);
  presenterState.words = words;
  presenterState.currentWord = 0;
  presenterState.charsPerMs = presenterState.speed / 60000;
  presenterState.running = true;
  presenterState.lastTime = performance.now();
  showPage('presenterPage');
  updatePresenterText();
  applyPresenterStyle();
  document.body.style.background = '#000';
  requestAnimationFrame(scrollLoop);
}

function splitForDisplay(text) {
  // Split into display chunks (~8-12 chars each for teleprompter feel)
  const clean = text.replace(/\n{2,}/g, '\n\n').trim();
  const chunks = [];
  let i = 0;
  while (i < clean.length) {
    let end = i + 10;
    if (end < clean.length) {
      // Try to break at punctuation or space
      const slice = clean.slice(i, end + 5);
      const m = slice.match(/[，。！？；、\n]/);
      if (m) end = i + m.index + 1;
    }
    chunks.push(clean.slice(i, end));
    i = end;
  }
  return chunks;
}

function scrollLoop(now) {
  if (!presenterState.running) { presenterState.rafId = requestAnimationFrame(scrollLoop); return; }
  const dt = now - presenterState.lastTime;
  presenterState.lastTime = now;
  const charsToAdvance = dt * presenterState.charsPerMs;
  presenterState.currentWord += charsToAdvance;
  const totalChars = presenterState.words.reduce((a,w)=>a+w.length,0);
  if (presenterState.currentWord >= totalChars) {
    presenterState.currentWord = 0;
  }
  updatePresenterText();
  presenterState.rafId = requestAnimationFrame(scrollLoop);
}

function updatePresenterText() {
  const { words, currentWord } = presenterState;
  // Find which chunk we're in
  let accumulated = 0;
  let currentChunk = 0;
  for (let i = 0; i < words.length; i++) {
    accumulated += words[i].length;
    if (accumulated > currentWord) { currentChunk = i; break; }
  }
  // Show surrounding chunks
  const start = Math.max(0, currentChunk - 1);
  const end = Math.min(words.length, currentChunk + 4);
  const visible = words.slice(start, end).join('');
  
  // Highlight active line
  const activeLine = words[currentChunk] || '';
  const before = words.slice(start, currentChunk).join('');
  const after = words.slice(currentChunk + 1, end).join('');

  document.getElementById('presenterText').innerHTML =
    '<div style="opacity:0.3;font-size:' + (presenterState.fontSize*0.7) + 'px">' + esc(before) + '</div>' +
    '<div style="font-size:' + presenterState.fontSize + 'px;font-weight:700;margin:8px 0">' + esc(activeLine) + '</div>' +
    '<div style="opacity:0.3;font-size:' + (presenterState.fontSize*0.7) + 'px">' + esc(after) + '</div>';

  // Progress bar
  const totalChars = words.reduce((a,w)=>a+w.length,0);
  const pct = totalChars > 0 ? Math.min(100, (currentWord / totalChars) * 100) : 0;
  document.getElementById('progressFill').style.height = pct + '%';
}

function applyPresenterStyle() {
  const el = document.getElementById('presenterText');
  const margin = presenterState.margin;
  document.getElementById('presenterContent').style.padding = '60px ' + margin + 'px';
  if (presenterState.mirror) el.classList.add('mirror');
  else el.classList.remove('mirror');
}

function stopPresent() {
  presenterState.running = false;
  if (presenterState.rafId) cancelAnimationFrame(presenterState.rafId);
  if (presenterState.voiceOn) stopVoice();
  document.getElementById('presenterEdit').style.display = 'none';
  showPage('editorPage');
}

// ── Settings ──
function openSettings() {
  document.getElementById('settingsOverlay').classList.add('show');
  // Sync toggles
  if (presenterState.mirror) document.getElementById('mirrorToggle').classList.add('on');
  else document.getElementById('mirrorToggle').classList.remove('on');
  if (presenterState.voiceOn) document.getElementById('voiceToggle').classList.add('on');
  else document.getElementById('voiceToggle').classList.remove('on');
  // Speed buttons
  document.querySelectorAll('.speed-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.speed) === presenterState.speed);
  });
}

function closeSettings() {
  document.getElementById('settingsOverlay').classList.remove('show');
}

function setSpeed(sp, btn) {
  presenterState.speed = sp;
  presenterState.charsPerMs = sp / 60000;
  document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function toggleMirror() {
  presenterState.mirror = !presenterState.mirror;
  document.getElementById('mirrorToggle').classList.toggle('on');
  applyPresenterStyle();
}

function updateMargin(v) { presenterState.margin = parseInt(v); applyPresenterStyle(); }
function updateFontSize(v) { presenterState.fontSize = parseInt(v); updatePresenterText(); }

function toggleVoice() {
  presenterState.voiceOn = !presenterState.voiceOn;
  document.getElementById('voiceToggle').classList.toggle('on');
  if (presenterState.voiceOn) startVoice();
  else stopVoice();
}

// ── Voice Recognition ──
let recognition = null;
function startVoice() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    toast('浏览器不支持语音识别');
    presenterState.voiceOn = false;
    return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'zh-CN';
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.onresult = (e) => {
    let transcript = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      transcript += e.results[i][0].transcript;
    }
    // Find matching position in text
    const fullText = presenterState.words.join('');
    const idx = fullText.indexOf(transcript.slice(-6));
    if (idx >= 0) {
      presenterState.currentWord = idx;
    }
  };
  recognition.onerror = () => { /* silent */ };
  recognition.start();
}

function stopVoice() {
  if (recognition) { recognition.stop(); recognition = null; }
}

// ── Inline Edit (long press) ──
let longPressTimer = null;
document.getElementById('presenterContent').addEventListener('touchstart', (e) => {
  longPressTimer = setTimeout(() => {
    // Stop scrolling temporarily
    const wasRunning = presenterState.running;
    presenterState.running = false;
    document.getElementById('presenterEditText').value = presenterState.words.join('');
    document.getElementById('presenterEdit').style.display = 'block';
    if (wasRunning) {
      document.getElementById('presenterEdit').dataset.wasRunning = '1';
    }
  }, 2000);
});
document.getElementById('presenterContent').addEventListener('touchend', () => {
  clearTimeout(longPressTimer);
});
document.getElementById('presenterContent').addEventListener('touchmove', () => {
  clearTimeout(longPressTimer);
});

function finishInlineEdit() {
  const newText = document.getElementById('presenterEditText').value;
  presenterState.words = splitForDisplay(newText);
  presenterState.currentWord = 0;
  document.getElementById('presenterEdit').style.display = 'none';
  // Resume if was running
  if (document.getElementById('presenterEdit').dataset.wasRunning === '1') {
    presenterState.running = true;
    presenterState.lastTime = performance.now();
    document.getElementById('presenterEdit').dataset.wasRunning = '0';
  }
  updatePresenterText();
  // Also update the script in storage
  const idx = scripts.findIndex(s => s.id === currentId);
  if (idx >= 0) { scripts[idx].content = newText; saveScripts(); }
}

// ── Tap to pause/resume ──
document.getElementById('presenterContent').addEventListener('click', (e) => {
  // Don't toggle if interacting with edit panel or if long press was triggered
  if (e.target.closest('#presenterEdit')) return;
  presenterState.running = !presenterState.running;
  if (presenterState.running) presenterState.lastTime = performance.now();
});

// ── Helpers ──
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id !== 'presenterPage') document.body.style.background = '#F5F0EB';
}

function saveScripts() {
  localStorage.setItem('gary_scripts', JSON.stringify(scripts));
}

function today() {
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1500);
}

// ── Init ──
renderHome();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Gary提词器</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F5F0EB; color: #3E2723;
      min-height: 100vh;
      user-select: none; -webkit-user-select: none;
    }
    .page { display: none; min-height: 100vh; }
    .page.active { display: block; }

    /* ── HOME ── */
    .home-header {
      background: #6F4E37; color: #fff;
      padding: 14px 16px; display: flex; justify-content: space-between; align-items: center;
      position: sticky; top: 0; z-index: 10;
    }
    .home-title { font-size: 18px; font-weight: 700; letter-spacing: 2px; }
    .home-header button { background: none; border: none; color: #fff; font-size: 14px; cursor: pointer; }
    .script-list { padding: 12px; }
    .script-item {
      background: #fff; border-radius: 12px; padding: 14px;
      margin-bottom: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      display: flex; align-items: center; gap: 10px;
      cursor: pointer; transition: transform 0.1s;
    }
    .script-item:active { transform: scale(0.98); }
    .script-item .cb {
      width: 22px; height: 22px; border: 2px solid #ccc;
      border-radius: 6px; flex-shrink: 0;
      display: none; align-items: center; justify-content: center;
    }
    .script-item.inSelect .cb { display: flex; }
    .script-item .cb.sel { background: #6F4E37; border-color: #6F4E37; }
    .script-item .cb.sel::after { content: '✓'; color: #fff; font-size: 14px; }
    .script-info { flex: 1; min-width: 0; }
    .script-info .t { font-size: 15px; font-weight: 600; color: #3E2723; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .script-info .m { font-size: 11px; color: #A1887F; margin-top: 4px; }
    .empty-state { text-align: center; padding: 60px 20px; color: #BCAAA4; }
    .empty-state .ic { font-size: 56px; }
    .empty-state p { margin-top: 10px; font-size: 14px; }
    .fab {
      position: fixed; bottom: 24px; right: 24px;
      width: 56px; height: 56px; border-radius: 28px;
      background: #6F4E37; color: #fff; border: none;
      font-size: 28px; cursor: pointer;
      box-shadow: 0 4px 16px rgba(111,78,55,0.3); z-index: 20;
    }
    .delete-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #D32F2F; color: #fff;
      padding: 14px; text-align: center;
      font-size: 16px; font-weight: 600;
      display: none; z-index: 30; cursor: pointer;
    }

    /* ── EDITOR ── */
    .editor-header {
      background: #6F4E37; color: #fff;
      padding: 12px 16px; display: flex; align-items: center; gap: 12px;
      position: sticky; top: 0; z-index: 10;
    }
    .editor-header .back { font-size: 18px; cursor: pointer; }
    .editor-header input {
      flex: 1; background: rgba(255,255,255,0.15); border: none;
      color: #fff; padding: 8px 12px; border-radius: 8px;
      font-size: 14px; outline: none;
    }
    .editor-header input::placeholder { color: rgba(255,255,255,0.5); }
    .editor-card {
      background: #fff; margin: 12px; border-radius: 14px;
      padding: 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .editor-card textarea {
      width: 100%; height: 280px; border: none; resize: none;
      font-size: 15px; line-height: 1.8; outline: none;
      font-family: inherit; color: #3E2723;
    }
    .editor-tools { display: flex; gap: 8px; padding: 0 12px 12px; }
    .tool-btn {
      flex: 1; padding: 12px; border-radius: 12px;
      border: none; font-size: 13px; font-weight: 600; cursor: pointer;
    }
    .btn-paste { background: #E8E0D9; color: #6F4E37; }
    .btn-save { background: #E8E0D9; color: #6F4E37; }
    .btn-start {
      background: #6F4E37; color: #fff;
      margin: 0 12px 20px; width: calc(100% - 24px);
      padding: 16px; border-radius: 14px; border: none;
      font-size: 17px; font-weight: 700; cursor: pointer; letter-spacing: 2px;
    }
    .btn-start:active { background: #5D3D2A; }

    /* ── PRESENTER ── */
    .pres-page { background: #000; }
    .pres-header {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; justify-content: space-between;
      padding: 12px 16px; z-index: 20;
    }
    .pres-header button { background: none; border: none; color: #666; font-size: 20px; cursor: pointer; }
    .pres-scroll {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      overflow-y: auto; z-index: 5;
      -webkit-overflow-scrolling: touch;
    }
    .pres-text {
      color: #fff; line-height: 1.8;
      white-space: pre-wrap; word-break: break-all;
      min-height: 100vh;
      padding-top: 70px; padding-bottom: 60vh;
    }
    .pres-text.mirror { transform: scaleX(-1); }
    .pres-text .line {
      display: block; opacity: 0.5; padding: 1px 0;
    }
    .pres-text .line.hi {
      opacity: 1; font-weight: 700;
    }
    .pres-play-btn {
      position: fixed; bottom: 30px; right: 20px;
      width: 64px; height: 64px; border-radius: 32px;
      background: #6F4E37; color: #fff; border: none;
      font-size: 15px; font-weight: 700; cursor: pointer;
      z-index: 25; letter-spacing: 1px;
      box-shadow: 0 4px 20px rgba(111,78,55,0.5);
    }
    .pres-play-btn.paused { background: #555; }
    .progress-bar {
      position: fixed; right: 0; top: 0; bottom: 0;
      width: 3px; background: rgba(255,255,255,0.1);
      z-index: 15; pointer-events: none;
    }
    .progress-fill {
      position: absolute; top: 0; left: 0; right: 0;
      background: rgba(255,255,255,0.4);
      transition: height 0.1s linear;
    }
    .pres-edit {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.9); z-index: 30;
      padding: 12px; display: none;
    }
    .pres-edit textarea {
      width: 100%; height: 120px; background: #222; color: #fff;
      border: 1px solid #444; border-radius: 8px; padding: 10px;
      font-size: 14px; resize: none; font-family: inherit;
    }
    .pres-edit button {
      width: 100%; margin-top: 8px; padding: 10px;
      background: #6F4E37; color: #fff; border: none;
      border-radius: 8px; font-size: 14px; cursor: pointer;
    }

    /* ── SETTINGS ── */
    .settings-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      z-index: 25; display: none; align-items: flex-end;
    }
    .settings-overlay.show { display: flex; }
    .settings-panel {
      background: #1a1a1a; border-radius: 20px 20px 0 0;
      padding: 20px 24px 40px; width: 100%; color: #fff;
    }
    .settings-panel h3 { font-size: 16px; margin-bottom: 16px; text-align: center; }
    .setting-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 0; border-bottom: 1px solid #333;
    }
    .setting-label { font-size: 14px; }
    .setting-row input[type="range"] { width: 120px; accent-color: #6F4E37; }
    .speed-btns { display: flex; gap: 6px; flex-wrap: wrap; }
    .speed-btn {
      padding: 6px 12px; border-radius: 8px; border: 1px solid #555;
      background: transparent; color: #aaa; font-size: 12px; cursor: pointer;
    }
    .speed-btn.active { background: #6F4E37; border-color: #6F4E37; color: #fff; }
    .toggle-switch {
      width: 48px; height: 28px; border-radius: 14px;
      background: #555; position: relative; cursor: pointer; transition: background 0.2s;
    }
    .toggle-switch.on { background: #6F4E37; }
    .toggle-switch::after {
      content: ''; position: absolute; top: 3px; left: 3px;
      width: 22px; height: 22px; border-radius: 11px;
      background: #fff; transition: left 0.2s;
    }
    .toggle-switch.on::after { left: 23px; }
    .settings-close {
      width: 100%; margin-top: 16px; padding: 12px;
      background: #333; color: #fff; border: none;
      border-radius: 10px; font-size: 14px; cursor: pointer;
    }

    .toast {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
      background: rgba(0,0,0,0.8); color: #fff; padding: 10px 24px;
      border-radius: 20px; font-size: 13px; z-index: 100;
      opacity: 0; transition: opacity 0.3s; pointer-events: none;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<!-- HOME -->
<div class="page active" id="homePage">
  <div class="home-header">
    <span class="home-title">📽 Gary提词器</span>
    <button id="headerBtn" onclick="toggleSelect()">选择</button>
  </div>
  <div class="script-list" id="scriptList"></div>
  <button class="fab" onclick="newScript()">＋</button>
  <div class="delete-bar" id="deleteBar" onclick="doDelete()">🗑 删除所选</div>
</div>

<!-- EDITOR -->
<div class="page" id="editorPage">
  <div class="editor-header">
    <span class="back" onclick="goHome()">←</span>
    <input type="text" id="scriptTitle" placeholder="输入标题...">
  </div>
  <div class="editor-card">
    <textarea id="scriptContent" placeholder="在此输入或粘贴演讲内容..."></textarea>
  </div>
  <div class="editor-tools">
    <button class="tool-btn btn-paste" onclick="pasteClip()">📋 粘贴</button>
    <button class="tool-btn btn-save" onclick="saveCurrent()">💾 保存</button>
  </div>
  <button class="btn-start" onclick="startPresent()">🎤 开始提词</button>
</div>

<!-- PRESENTER -->
<div class="page pres-page" id="presenterPage">
  <div class="pres-header">
    <button onclick="stopPresent()">←</button>
    <button onclick="openSettings()">⚙</button>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="pres-scroll" id="presScroll">
    <div class="pres-text" id="presText"></div>
  </div>
  <button class="pres-play-btn" id="playBtn">▶ 播放</button>
  <div class="pres-edit" id="presEdit">
    <textarea id="presEditText"></textarea>
    <button onclick="finishEdit()">完成编辑</button>
  </div>
</div>

<!-- SETTINGS -->
<div class="settings-overlay" id="settingsOverlay" onclick="closeSettings()">
  <div class="settings-panel" onclick="event.stopPropagation()">
    <h3>⚙ 设置</h3>
    <div class="setting-row">
      <span class="setting-label">播放速度（字/分）</span>
      <div class="speed-btns" id="speedBtns">
        <button class="speed-btn" data-s="100" onclick="setSpeed(100,this)">100</button>
        <button class="speed-btn" data-s="140" onclick="setSpeed(140,this)">140</button>
        <button class="speed-btn" data-s="180" onclick="setSpeed(180,this)">180</button>
        <button class="speed-btn" data-s="220" onclick="setSpeed(220,this)">220</button>
        <button class="speed-btn active" data-s="260" onclick="setSpeed(260,this)">260</button>
        <button class="speed-btn" data-s="300" onclick="setSpeed(300,this)">300</button>
        <button class="speed-btn" data-s="340" onclick="setSpeed(340,this)">340</button>
        <button class="speed-btn" data-s="380" onclick="setSpeed(380,this)">380</button>

      </div>
    </div>
    <div class="setting-row">
      <span class="setting-label">🪞 镜像</span>
      <div class="toggle-switch" id="mirrorSw" onclick="toggleMirror()"></div>
    </div>
    <div class="setting-row">
      <span class="setting-label">📐 页边距</span>
      <input type="range" id="marginSlider" min="4" max="150" value="16" oninput="updateMargin(this.value)">
    </div>
    <div class="setting-row">
      <span class="setting-label">🔤 字体大小</span>
      <input type="range" min="20" max="52" value="32" oninput="updateFont(this.value)">
    </div>
    <div class="setting-row">
      <span class="setting-label">🎙 语音跟踪</span>
      <div class="toggle-switch" id="voiceSw" onclick="toggleVoice()"></div>
    </div>
    <button class="settings-close" onclick="closeSettings()">关闭</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── STATE ──
let scripts = JSON.parse(localStorage.getItem('gary_scripts')||'[]');
let curId = null;
let selMode = false, selSet = new Set();

let ps = {
  running: false, speed: 260, mirror: false,
  margin: 16, fontSize: 32, voiceOn: false,
  fullText: '', lines: [], curLine: 0,
  raf: null, lastT: 0, cpm: 260/60000, charAccum: 0,
  userScroll: false, scrollTO: null
};

// ── DYNAMIC LINE SPLIT ──
function splitLines() {
  let el = document.getElementById('presText');
  let containerW = window.innerWidth - ps.margin * 2;
  // Approximate: a Chinese char at fontSize px takes about fontSize px width
  let charsPerLine = Math.floor(containerW / ps.fontSize);
  if (charsPerLine < 1) charsPerLine = 1;
  
  let text = ps.fullText;
  let result = [];
  let i = 0;
  while (i < text.length) {
    let end = i + charsPerLine;
    if (end >= text.length) {
      result.push(text.slice(i));
      break;
    }
    // Pure character count, no punctuation breaking
    result.push(text.slice(i, end));
    i = end;
  }
  ps.lines = result;
}

function renderLines() {
  splitLines();
  let html = '';
  for (let i=0; i<ps.lines.length; i++) {
    html += `<span class="line${i===ps.curLine?' hi':''}" data-l="${i}" onclick="jumpLine(${i},event)">${esc(ps.lines[i]||'&nbsp;')}</span>`;
  }
  document.getElementById('presText').innerHTML = html;
  document.getElementById('presText').style.fontSize = ps.fontSize+'px';
}

function reflowLines() {
  splitLines();
  // Adjust curLine proportionally
  if (ps.lines.length > 0) {
    let totalChars = ps.fullText.length;
    let done = 0;
    for (let i=0; i<Math.min(ps.curLine, ps.lines.length); i++) done += (ps.lines[i]||'').length;
    let ratio = totalChars > 0 ? done / totalChars : 0;
    let newTotal = 0;
    for (let l of ps.lines) newTotal += (l||'').length;
    let target = ratio * newTotal;
    let acc = 0;
    for (let i=0; i<ps.lines.length; i++) {
      acc += (ps.lines[i]||'').length;
      if (acc >= target) { ps.curLine = i; break; }
    }
  }
  renderLines();
  updateProgress();
}

window.addEventListener('resize', () => {
  if (document.getElementById('presenterPage').classList.contains('active')) {
    reflowLines();
    scrollToActive();
  }
});

// ── HOME ──
function renderHome() {
  let list = document.getElementById('scriptList');
  let btn = document.getElementById('headerBtn');
  let bar = document.getElementById('deleteBar');
  let fab = document.querySelector('.fab');
  if (scripts.length===0) {
    list.innerHTML = '<div class="empty-state"><div class="ic">📂</div><p>还没有提词稿<br>点击 ＋ 新建</p></div>';
    btn.style.display='none'; selMode=false; selSet.clear();
  } else {
    btn.style.display='';
    list.innerHTML = scripts.map((s,i)=>{
      let sel = selSet.has(i);
      return `<div class="script-item${selMode?' inSelect':''}" onclick="${selMode?`toggleSel(${i},event)`:`openScript(${i})`}">
        <div class="cb${sel?' sel':''}"></div>
        <div class="script-info"><div class="t">${esc(s.title||'未命名')}</div><div class="m">${s.date} · ${cc(s.content)}字</div></div>
      </div>`;
    }).join('');
  }
  btn.textContent = selMode?'取消':'选择';
  bar.style.display = selMode?'block':'none';
  fab.style.display = selMode?'none':'';
}

function cc(t){ return t.replace(/\s/g,'').length; }
function esc(s){ return s.replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function toggleSelect(){ selMode=!selMode; selSet.clear(); renderHome(); }
function toggleSel(i,e){ e.stopPropagation(); if(selSet.has(i))selSet.delete(i); else selSet.add(i); renderHome(); }
function doDelete(){
  if(!selSet.size)return;
  if(!confirm(`确定删除 ${selSet.size} 个？`))return;
  let sorted=[...selSet].sort((a,b)=>b-a);
  for(let i of sorted)scripts.splice(i,1);
  selSet.clear(); selMode=false; saveScripts(); renderHome();
}
function newScript(){
  if(selMode)return;
  curId=Date.now().toString();
  document.getElementById('scriptTitle').value='';
  document.getElementById('scriptContent').value='';
  showPage('editorPage');
}
function openScript(i){
  let s=scripts[i]; curId=s.id;
  document.getElementById('scriptTitle').value=s.title;
  document.getElementById('scriptContent').value=s.content;
  showPage('editorPage');
}

// ── EDITOR ──
function saveCurrent(){
  let title=document.getElementById('scriptTitle').value.trim()||'未命名';
  let content=document.getElementById('scriptContent').value;
  let idx=scripts.findIndex(s=>s.id===curId);
  let obj={id:curId,title,content,date:today()};
  if(idx>=0)scripts[idx]=obj; else scripts.unshift(obj);
  saveScripts(); toast('已保存 ✅');
}
async function pasteClip(){
  try{let t=await navigator.clipboard.readText(); if(t){document.getElementById('scriptContent').value=t; toast('已粘贴 📋');}}
  catch(e){toast('请手动粘贴');}
}
function goHome(){ saveCurrent(); showPage('homePage'); renderHome(); }

// ── PRESENTER ──
function startPresent(){
  let content=document.getElementById('scriptContent').value;
  if(!content.trim()){toast('请先输入内容');return;}
  saveCurrent();
  ps.fullText = content;
  ps.curLine=0; ps.cpm=ps.speed/60000;
  ps.running=false; ps.userScroll=false;
  showPage('presenterPage');
  renderLines();
  applyMargins();
  // Position first line at 35% from top for natural reading position
  let presScroll = document.getElementById('presScroll');
  let presText = document.getElementById('presText');
  let firstLine = presText.querySelector('.line.hi');
  if(firstLine){
    let lineTop = firstLine.offsetTop;
    let viewH = presScroll.clientHeight;
    presScroll.scrollTop = lineTop - viewH * 0.35;
  }
  updatePlayBtn(); updateProgress();
}

function jumpLine(i,e){
  e.stopPropagation();
  ps.curLine=i; renderLines(); updateProgress(); scrollToActive();
}

function togglePlay(){
  ps.running=!ps.running;
  updatePlayBtn();
  if(ps.running){
    ps.lastT=performance.now(); ps.charAccum=0;
    ps.userScroll=false; scrollToActive();
    ps.raf=requestAnimationFrame(scrollLoop);
  }
}

function updatePlayBtn(){
  let btn=document.getElementById('playBtn');
  if(ps.running){ btn.textContent='⏸ 暂停'; btn.classList.add('paused'); }
  else{ btn.textContent='▶ 播放'; btn.classList.remove('paused'); }
}

function scrollLoop(now){
  if(!ps.running){return;}
  if(ps.userScroll){ps.raf=requestAnimationFrame(scrollLoop);return;}
  let dt=now-ps.lastT; ps.lastT=now;
  ps.charAccum += dt * ps.cpm;
  let advLines = 0;
  while(ps.charAccum > 0 && ps.curLine < ps.lines.length){
    let len = (ps.lines[ps.curLine] || '').length || 1;
    if(ps.charAccum >= len){
      ps.charAccum -= len;
      ps.curLine++;
      advLines++;
    } else {
      break;
    }
  }
  if(ps.curLine>=ps.lines.length)ps.curLine=0;
  renderLines(); updateProgress(); scrollToActive();
  ps.raf=requestAnimationFrame(scrollLoop);
}

function updateProgress(){
  let total=0; for(let l of ps.lines)total+=(l||'').length;
  let done=0; for(let i=0;i<ps.curLine;i++)done+=(ps.lines[i]||'').length;
  document.getElementById('progressFill').style.height=(total>0?Math.min(100,(done/total)*100):0)+'%';
}

let srAF=null;
function scrollToActive(){
  if(srAF)return;
  srAF=requestAnimationFrame(()=>{
    srAF=null;
    if(ps.userScroll)return;
    let el=document.querySelector('#presText .line.hi');
    if(el)el.scrollIntoView({behavior:'smooth',block:'center'});
  });
}

function applyMargins(){
  document.getElementById('presText').style.paddingLeft=ps.margin+'px';
  document.getElementById('presText').style.paddingRight=ps.margin+'px';
  // Re-split when margin changes
  if(document.getElementById('presenterPage').classList.contains('active')){
    reflowLines();
    scrollToActive();
  }
}

function stopPresent(){
  ps.running=false;
  if(ps.raf)cancelAnimationFrame(ps.raf);
  if(ps.voiceOn)stopVoice();
  document.getElementById('presEdit').style.display='none';
  showPage('editorPage');
}

function bindScroll(){
  let el=document.getElementById('presScroll');
  el.onscroll=()=>{
    ps.userScroll=true;
    clearTimeout(ps.scrollTO);
    ps.scrollTO=setTimeout(()=>{ps.userScroll=false;scrollToActive();},2000);
  };
}

// LONG PRESS EDIT
let lpT=null;
document.addEventListener('DOMContentLoaded',()=>{
  // Play button with pointerdown for instant response
  document.getElementById('playBtn').addEventListener('pointerdown',(e)=>{
    e.preventDefault(); e.stopPropagation();
    togglePlay();
  });
  // Also support regular click
  document.getElementById('playBtn').addEventListener('click',(e)=>{
    e.preventDefault(); e.stopPropagation();
  });
  let s=document.getElementById('presScroll');
  s.addEventListener('touchstart',(e)=>{
    if(e.target.classList.contains('line'))return;
    lpT=setTimeout(()=>{
      let ed=document.getElementById('presEdit');
      ed.dataset.wr=ps.running?'1':'0';
      ps.running=false; updatePlayBtn();
      document.getElementById('presEditText').value=ps.fullText;
      ed.style.display='block';
    },2000);
  });
  s.addEventListener('touchend',()=>clearTimeout(lpT));
  s.addEventListener('touchmove',()=>clearTimeout(lpT));
});

function finishEdit(){
  let t=document.getElementById('presEditText').value;
  ps.fullText=t; ps.curLine=0;
  renderLines(); scrollToActive(); updateProgress();
  document.getElementById('presEdit').style.display='none';
  if(document.getElementById('presEdit').dataset.wr==='1'){
    ps.running=true; ps.lastT=performance.now();
    updatePlayBtn(); requestAnimationFrame(scrollLoop);
  }
  let idx=scripts.findIndex(s=>s.id===curId);
  if(idx>=0){scripts[idx].content=t; saveScripts();}
}

// ── SETTINGS ──
function openSettings(){
  document.getElementById('settingsOverlay').classList.add('show');
  document.getElementById('mirrorSw').classList.toggle('on',ps.mirror);
  document.getElementById('voiceSw').classList.toggle('on',ps.voiceOn);
  document.querySelectorAll('.speed-btn').forEach(b=>b.classList.toggle('active',+b.dataset.s===ps.speed));
  // Sync margin slider
  document.getElementById('marginSlider').value = ps.margin;
}

function closeSettings(){ document.getElementById('settingsOverlay').classList.remove('show'); }

function setSpeed(sp,btn){
  ps.speed=sp; ps.cpm=sp/60000;
  document.querySelectorAll('.speed-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function toggleMirror(){
  ps.mirror=!ps.mirror;
  document.getElementById('mirrorSw').classList.toggle('on');
  document.getElementById('presText').classList.toggle('mirror',ps.mirror);
}

function updateMargin(v){
  ps.margin=+v;
  applyMargins();
}

function updateFont(v){
  ps.fontSize=+v;
  document.getElementById('presText').style.fontSize=ps.fontSize+'px';
  if(document.getElementById('presenterPage').classList.contains('active')){
    reflowLines();
    scrollToActive();
  }
}

// ── VOICE ──
let rec=null;
function toggleVoice(){
  ps.voiceOn=!ps.voiceOn;
  document.getElementById('voiceSw').classList.toggle('on');
  ps.voiceOn?startVoice():stopVoice();
}
function startVoice(){
  if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window)){
    toast('不支持语音'); ps.voiceOn=false; document.getElementById('voiceSw').classList.remove('on'); return;
  }
  rec=new(window.SpeechRecognition||window.webkitSpeechRecognition)();
  rec.lang='zh-CN'; rec.continuous=true; rec.interimResults=true;
  rec.onresult=e=>{
    let t='';for(let i=e.resultIndex;i<e.results.length;i++)t+=e.results[i][0].transcript;
    // Check if last 3 chars of ANY upcoming line match the end of spoken text
    let tail = t.slice(-3);
    for(let li=ps.curLine; li<Math.min(ps.curLine+5, ps.lines.length); li++){
      let line = (ps.lines[li]||'').slice(-3);
      if(line && t.indexOf(line)>=0){
        if(li > ps.curLine){
          ps.curLine = li;
          renderLines(); updateProgress(); scrollToActive();
        }
        break;
      }
    }
    // Auto-start playback if not already running
    if(!ps.running){
      ps.running=true; ps.lastT=performance.now(); ps.charAccum=0;
      updatePlayBtn();
      if(!ps.raf || ps.raf._done) ps.raf=requestAnimationFrame(scrollLoop);
    }
  };
  rec.start();
}
function stopVoice(){if(rec){rec.stop();rec=null;}}

// ── HELPERS ──
function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.body.style.background=id==='presenterPage'?'#000':'#F5F0EB';
  if(id==='presenterPage')bindScroll();
}
function saveScripts(){localStorage.setItem('gary_scripts',JSON.stringify(scripts));}
function today(){
  let d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function toast(msg){
  let t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1500);
}

renderHome();
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js');
</script>
